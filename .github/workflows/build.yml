name: Build Missing Architectures

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            name: windows-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-intel

          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            name: linux-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential curl wget file libssl-dev libgtk-3-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure Linux ARM64 linker
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm